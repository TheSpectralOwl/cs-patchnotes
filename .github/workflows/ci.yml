name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Verify archive
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run check:infra
      - run: npm run test:pipeline
      - run: npm run check -w @cs-patchnotes/archive
      - run: npm run build -w @cs-patchnotes/archive-api
      - run: npm test -w @cs-patchnotes/archive-api
      - run: npm run build:cloudflare
      - run: CONTENT_HOST_DIR=/tmp RELOAD_TOKEN=ci TUNNEL_TOKEN=ci docker compose -f docker-compose.archive.yml --profile vps config
