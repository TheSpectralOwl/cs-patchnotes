# LOCAL DEBUG ONLY — never deployed to the VPS.
#
# Compose auto-merges this override for a plain `docker compose up`, adding
# loopback-only (127.0.0.1) host binds so you can hit Meilisearch and the API
# from your laptop while debugging. These binds are loopback, never 0.0.0.0.
#
# On the VPS, deploy with the base file explicitly so this override is NOT merged:
#     docker compose -f docker-compose.yml --profile vps up -d
# That keeps Meilisearch fully private (OPS-01) and opens zero inbound ports (OPS-02).
services:
  meili:
    ports:
      - "127.0.0.1:7700:7700"
  api:
    ports:
      - "127.0.0.1:3000:3000"
